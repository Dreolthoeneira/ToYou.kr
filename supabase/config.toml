project_id = "toyou-storefront"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
major_version = 17

[auth]
enabled = true
site_url = "https://toyou.kr"
additional_redirect_urls = [
  "https://toyou.kr/**",
  "https://www.toyou.kr/**",
  "http://localhost:5173/**",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "[TO YOU] 이메일 인증을 완료해 주세요"
content_path = "./supabase/templates/confirmation.html"

[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 587
user = "resend"
pass = "env(RESEND_SMTP_PASSWORD)"
admin_email = "no-reply@toyou.kr"
sender_name = "TO YOU"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled = true

[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

[functions.catalog-tools]
verify_jwt = false

[functions.naver-userinfo]
verify_jwt = false
