project_id = "toyou-storefront"

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
major_version = 17

[auth]
enabled = true
site_url = "https://toyou.kr"
additional_redirect_urls = [
  "https://toyou.kr/**",
  "https://www.toyou.kr/**",
  "http://localhost:5173/**",
]

[storage]
enabled = true

[functions.catalog-tools]
verify_jwt = false
